services:
  - type: web
    name: ron3ia-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RON3IA_SECRET_TOKEN
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: API_KEY
        sync: false
